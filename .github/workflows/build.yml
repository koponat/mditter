name: mditter
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4  # 升级到 v4 插件
        with:
          gradle-version: 8.10.2  # 显式指定一个具体的版本号避免歧义

      - name: build with gradle
        run: chmod +x gradlew && ./gradlew build  # 优先使用项目自带的 wrapper
